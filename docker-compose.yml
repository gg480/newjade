version: "3.8"

services:
  jade-inventory:
    image: ${DOCKERHUB_USERNAME:-your-username}/jade-inventory:latest
    container_name: jade-inventory
    ports:
      - "5000:5000"
    volumes:
      - jade-db:/app/db
      - jade-images:/app/data/images
    environment:
      - DATABASE_URL=file:./db/custom.db
      - DATA_DIR=/app/data
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  jade-db:
    driver: local
  jade-images:
    driver: local
