version: "3.8"

services:
  jade-inventory:
    # 阿里云 ACR（国内快，推荐极空间使用）
    image: crpi-mhs13r1rv9emmqbi.cn-hangzhou.personal.cr.aliyuncs.com/jadeerp/jadeerp:latest
    # Docker Hub（备选，国内慢）
    # image: lrunningmjgoat/jade-inventory:latest
    container_name: jade-inventory
    ports:
      - "5000:5000"
    volumes:
      # Map all persistent data to a local directory on your NAS
      # - db/       → SQLite database
      # - images/   → User uploaded images
      # - logs/     → Application logs
      # Change ./jade-data to any path on your NAS
      - ./jade-data:/app/data
    environment:
      - DATA_DIR=/app/data
      - NODE_ENV=production
      # PUID/PGID for NAS permission compatibility
      # Default 0 = run as root (simplest, works on all NAS)
      - PUID=0
      - PGID=0
    restart: unless-stopped
