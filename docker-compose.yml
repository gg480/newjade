version: "3.8"

services:
  jade-inventory:
    image: lrunningmjgoat/jade-inventory:latest
    container_name: jade-inventory
    ports:
      - "5000:5000"
    volumes:
      # Map all persistent data to a local directory on your NAS
      # - db/       → SQLite database
      # - images/   → User uploaded images
      # - logs/     → Application logs
      # Change ./jade-data to any path on your NAS, e.g. /volume1/docker/jade-data
      - ./jade-data:/app/data
    environment:
      - DATA_DIR=/app/data
      - NODE_ENV=production
      # PUID/PGID for NAS permission compatibility
      # Default 0 = run as root (simplest, works on all NAS)
      # Set to your NAS user/group id for tighter security (e.g. 1000:1000)
      - PUID=0
      - PGID=0
    restart: unless-stopped
