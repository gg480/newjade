version: "3.8"

services:
  jade-inventory:
    # 建议在 .env 中设置 JADE_IMAGE 为固定 sha tag，避免 latest 漂移
    # 示例:
    # JADE_IMAGE=crpi-mhs13r1rv9emmqbi.cn-hangzhou.personal.cr.aliyuncs.com/jadeerp/jadeerp:sha-xxxxxxxx
    image: ${JADE_IMAGE:-crpi-mhs13r1rv9emmqbi.cn-hangzhou.personal.cr.aliyuncs.com/jadeerp/jadeerp:latest}
    container_name: jade-inventory
    ports:
      - "${JADE_PORT:-5000}:5000"
    volumes:
      # 建议在 .env 中配置宿主机绝对路径（NAS 更稳定）
      - ${JADE_DB_DIR:-./jade-ssd/db}:/app/data/db
      - ${JADE_IMAGE_DIR:-./jade-hdd/images}:/app/data/images
      - ${JADE_LOG_DIR:-./jade-ssd/logs}:/app/data/logs
      - ${JADE_BACKUP_DIR:-./jade-ssd/backups}:/app/backups
      - ${JADE_CONFIG_DIR:-./jade-ssd/config}:/app/config
    environment:
      - DATA_DIR=/app/data
      - BACKUP_DIR=/app/backups
      - NODE_ENV=production
      - TZ=${TZ:-Asia/Shanghai}
      # PUID/PGID for NAS permission compatibility
      # Default 0 = run as root (simplest, works on all NAS)
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
