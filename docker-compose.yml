version: "3.8"

services:
  jade-inventory:
    # 阿里云 ACR（国内快，推荐极空间使用）
    image: crpi-mhs13r1rv9emmqbi.cn-hangzhou.personal.cr.aliyuncs.com/jadeerp/jadeerp:latest
    # Docker Hub（备选，国内慢）
    # image: lrunningmjgoat/jade-inventory:latest
    container_name: jade-inventory
    ports:
      - "5000:5000"
    volumes:
      # ===== 可按磁盘类型分开挂载 =====
      # 建议：DB/日志/配置放 SSD，图片放 HDD
      # SSD: 数据库
      - ./jade-ssd/db:/app/data/db
      # HDD: 图片
      - ./jade-hdd/images:/app/data/images
      # SSD: 日志目录（当前主要是预留）
      - ./jade-ssd/logs:/app/data/logs
      # SSD: 运行目录备份（恢复前自动备份文件）
      - ./jade-ssd/backups:/app/backups
      # SSD: 预留配置目录（后续文件配置可放这里）
      - ./jade-ssd/config:/app/config
    environment:
      - DATA_DIR=/app/data
      - BACKUP_DIR=/app/backups
      - NODE_ENV=production
      # PUID/PGID for NAS permission compatibility
      # Default 0 = run as root (simplest, works on all NAS)
      - PUID=0
      - PGID=0
    restart: unless-stopped
