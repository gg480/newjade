version: "3.8"

services:
  jade-inventory:
    image: ${DOCKERHUB_USERNAME:-your-username}/jade-inventory:latest
    container_name: jade-inventory
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      # Single volume for all persistent data (db + images + logs)
      - jade-data:/app/data
    environment:
      - DATA_DIR=/app/data
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  jade-data:
    driver: local
